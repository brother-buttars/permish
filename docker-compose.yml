# Permish — Docker Compose
#
# Local development (no HTTPS):
#   docker compose up -d
#
# Production with HTTPS:
#   DOMAIN=permish.app docker compose --profile production up -d
#
# PocketBase mode:
#   PUBLIC_BACKEND=pocketbase docker compose --profile pocketbase up -d
#
# PocketBase + HTTPS:
#   DOMAIN=permish.app PUBLIC_BACKEND=pocketbase docker compose --profile pocketbase --profile production up -d

services:
  # =========================================================================
  # Caddy — Reverse proxy with automatic HTTPS (production profile)
  # =========================================================================
  caddy:
    image: caddy:2-alpine
    profiles: ["production"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - PUBLIC_BACKEND=${PUBLIC_BACKEND:-express}

  # =========================================================================
  # Express Backend (default mode)
  # =========================================================================
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "3001"
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - db-data:/app/data
      - pdf-storage:/app/pdfs
      - uploads-storage:/app/uploads
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - PDF_DIR=/app/pdfs
      - UPLOADS_DIR=/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =========================================================================
  # PocketBase (only with --profile pocketbase)
  # =========================================================================
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    profiles: ["pocketbase"]
    restart: unless-stopped
    expose:
      - "8090"
    ports:
      - "${PB_PORT:-8090}:8090"
    volumes:
      - pb-data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations
    command: serve --http=0.0.0.0:8090
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =========================================================================
  # Node.js Sidecar — PDF, email, SMS (only with --profile pocketbase)
  # =========================================================================
  sidecar:
    build: ./sidecar
    profiles: ["pocketbase"]
    restart: unless-stopped
    expose:
      - "3002"
    ports:
      - "${SIDECAR_PORT:-3002}:3002"
    volumes:
      - pdf-storage:/app/pdfs
    depends_on:
      pocketbase:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PORT=3002
      - PB_URL=http://pocketbase:8090
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD:-}
      - PDF_DIR=/app/pdfs
      - FRONTEND_URL=${DOMAIN:+https://${DOMAIN}}
      - DOMAIN=${DOMAIN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =========================================================================
  # SvelteKit Frontend (runs in all modes)
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      args:
        - PUBLIC_BACKEND=${PUBLIC_BACKEND:-express}
        - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:3001}
        - PUBLIC_PB_URL=${PUBLIC_PB_URL:-http://localhost:8090}
        - PUBLIC_SIDECAR_URL=${PUBLIC_SIDECAR_URL:-http://localhost:3002}
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - PUBLIC_BACKEND=${PUBLIC_BACKEND:-express}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:3001}
      - PUBLIC_PB_URL=${PUBLIC_PB_URL:-http://localhost:8090}
      - PUBLIC_SIDECAR_URL=${PUBLIC_SIDECAR_URL:-http://localhost:3002}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db-data:
  pdf-storage:
  uploads-storage:
  pb-data:
  caddy_data:
  caddy_config:
