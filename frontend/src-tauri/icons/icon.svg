<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Rounded square background with warm orange gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316" />
      <stop offset="100%" style="stop-color:#ea580c" />
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg)" />

  <!-- Clipboard body -->
  <rect x="280" y="240" width="464" height="580" rx="40" fill="white" opacity="0.95" />

  <!-- Clipboard clip at top -->
  <rect x="380" y="180" width="264" height="100" rx="30" fill="white" opacity="0.95" />
  <rect x="420" y="160" width="184" height="60" rx="20" fill="#ea580c" />

  <!-- Checkmark -->
  <polyline points="370,530 460,620 654,426" fill="none" stroke="#16a34a" stroke-width="60" stroke-linecap="round" stroke-linejoin="round" />
</svg>
